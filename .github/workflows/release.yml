name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run dist:mac
          - name: Windows
            os: windows-latest
            command: npm run dist:win

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write release environment
        run: npm run prepare:release-env
        env:
          WAYBETTER_GOOGLE_CLIENT_ID: ${{ vars.WAYBETTER_GOOGLE_CLIENT_ID || secrets.WAYBETTER_GOOGLE_CLIENT_ID }}
          WAYBETTER_MICROSOFT_CLIENT_ID: ${{ vars.WAYBETTER_MICROSOFT_CLIENT_ID || secrets.WAYBETTER_MICROSOFT_CLIENT_ID }}
          WAYBETTER_MICROSOFT_REDIRECT_PORT: ${{ vars.WAYBETTER_MICROSOFT_REDIRECT_PORT || '53685' }}
          WAYBETTER_ZOOM_CLIENT_ID: ${{ vars.WAYBETTER_ZOOM_CLIENT_ID || secrets.WAYBETTER_ZOOM_CLIENT_ID }}
          WAYBETTER_ZOOM_REDIRECT_PORT: ${{ vars.WAYBETTER_ZOOM_REDIRECT_PORT || '53683' }}
          WAYBETTER_TEAMS_CLIENT_ID: ${{ vars.WAYBETTER_TEAMS_CLIENT_ID || secrets.WAYBETTER_TEAMS_CLIENT_ID }}
          WAYBETTER_TEAMS_REDIRECT_PORT: ${{ vars.WAYBETTER_TEAMS_REDIRECT_PORT || '53684' }}

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build distributables
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: release-assets/*
